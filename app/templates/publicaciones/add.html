{% extends 'base.html' %}

{% block titulo_pagina %}
Crear publicación
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <form method="POST">

                    <!-- TÍTULO -->
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" name="titulo" class="form-control" placeholder="Escribe un título..." required>
                    </div>

                    <!-- CONTENIDO -->
                    <div class="mb-3">
                        <label class="form-label">Contenido</label>
                        <textarea name="contenido" class="form-control" rows="5" placeholder="Escribe tu publicación..." required></textarea>
                    </div>

                    <!-- 🟢 ETIQUETAS (NUEVO) -->
                    <div class="mb-3">
                        <label class="form-label">Etiquetas</label>
                        <input type="text" name="etiquetas" class="form-control" placeholder="Ej: flask, python, web">
                        <small class="text-muted">Separa las etiquetas con comas (,)</small>
                    </div>

                    <!-- BOTONES -->
                    <div class="d-flex justify-content-between">

                        <a href="{{ url_for('publicacion.lista') }}" class="btn btn-secondary">
                            Volver
                        </a>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i> Publicar
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
